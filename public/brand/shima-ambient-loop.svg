<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice" fill="none">
  <defs>
    <linearGradient id="base" x1="0" y1="0" x2="1920" y2="1080" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8F4EC"/>
      <stop offset="1" stop-color="#E8DFD0"/>
    </linearGradient>
    <radialGradient id="orb1" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(400 300) rotate(0) scale(500)">
      <stop stop-color="#D4AF37" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#D4AF37" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb2" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1500 700) rotate(0) scale(600)">
      <stop stop-color="#2D4A3E" stop-opacity="0.2"/>
      <stop offset="1" stop-color="#2D4A3E" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb3" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(960 540) rotate(0) scale(700)">
      <stop stop-color="#F0D78C" stop-opacity="0.2"/>
      <stop offset="1" stop-color="#F0D78C" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
  </defs>
  <rect width="1920" height="1080" fill="url(#base)"/>
  <g filter="url(#blur)">
    <circle cx="400" cy="300" r="420" fill="url(#orb1)">
      <animate attributeName="cx" dur="3s" repeatCount="indefinite" values="400;520;400" keyTimes="0;0.5;1"/>
      <animate attributeName="cy" dur="3s" repeatCount="indefinite" values="300;380;300" keyTimes="0;0.5;1"/>
      <animate attributeName="opacity" dur="3s" repeatCount="indefinite" values="1;0.7;1" keyTimes="0;0.5;1"/>
    </circle>
    <circle cx="1500" cy="700" r="480" fill="url(#orb2)">
      <animate attributeName="cx" dur="3s" repeatCount="indefinite" values="1500;1380;1500" keyTimes="0;0.5;1"/>
      <animate attributeName="cy" dur="3s" repeatCount="indefinite" values="700;620;700" keyTimes="0;0.5;1"/>
      <animate attributeName="opacity" dur="3s" repeatCount="indefinite" values="0.8;1;0.8" keyTimes="0;0.5;1"/>
    </circle>
    <circle cx="960" cy="540" r="520" fill="url(#orb3)">
      <animate attributeName="r" dur="3s" repeatCount="indefinite" values="480;560;480" keyTimes="0;0.5;1"/>
      <animate attributeName="opacity" dur="3s" repeatCount="indefinite" values="0.6;0.9;0.6" keyTimes="0;0.5;1"/>
    </circle>
  </g>
  <rect width="1920" height="1080" fill="url(#base)" opacity="0.15">
    <animate attributeName="opacity" dur="3s" repeatCount="indefinite" values="0.1;0.22;0.1" keyTimes="0;0.5;1"/>
  </rect>
</svg>
