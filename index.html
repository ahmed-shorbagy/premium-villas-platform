<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="apple-touch-icon" href="/favicon.svg" />
  <title>حجز فلل فاخرة</title>
  <meta name="description"
    content="اكتشف فللاً فاخرة للإيجار. تصفية متقدمة، أسعار واضحة، وحجز مباشر عبر واتساب." />

  <meta property="og:title" content="حجز فلل فاخرة" />
  <meta property="og:description"
    content="اكتشف فللاً فاخرة للإيجار. تصفية متقدمة، أسعار واضحة، وحجز مباشر عبر واتساب." />

  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:image" content="/og-default.svg" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Almarai:wght@300;400;700;800&family=Cairo:wght@400;500;600;700&family=Tajawal:wght@400;500;700&display=swap"
    rel="stylesheet">
  <script>
    (function () {
      try {
        var s = localStorage.getItem("premium-villas-hype-season");
        if (s === "summer" || s === "winter") {
          document.documentElement.setAttribute("data-hype", s);
        } else {
          document.documentElement.setAttribute("data-hype", "summer");
        }
      } catch (e) {
        document.documentElement.setAttribute("data-hype", "summer");
      }
    })();
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
